# ─────────────────────────────────────────────────────────────────────────────
# Ritha Web — nginx SPA config
# Mounted into nginx:1.27-alpine at /etc/nginx/conf.d/ritha-web.conf
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip (nginx:alpine has the core gzip module built in)
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Security headers — applied to every response.
    # CSP is conservative: allow self + Google Fonts (used by index.html).
    # Wildcard 'connect-src' keeps this portable; tighten to your API host in Phase 3.
    add_header X-Frame-Options           "DENY"             always;
    add_header X-Content-Type-Options    "nosniff"          always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(self), microphone=(), geolocation=(self)" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Health probe for the container / load balancer.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Hashed static assets (JS/CSS/images emitted by Vite under /assets/).
    # Safe to cache aggressively because filenames include a content hash.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache the entry document — it references the current asset hashes.
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
        try_files $uri =404;
    }

    # SPA fallback: any unknown path serves index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
