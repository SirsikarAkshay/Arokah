# Cloudflare Pages project config.
# Used by `wrangler pages deploy dist` from the frontend/ directory.
# Deploy with: npm run build && npx wrangler pages deploy dist --project-name=ritha-web
#
# Custom domains (configured in Cloudflare dashboard → Pages → ritha-web → Custom domains):
#   - getritha.com        (apex)
#   - www.getritha.com    (redirects to apex)
#   - ritha.app           (serves .well-known/* for Universal Links & App Links)
#
# Build settings (dashboard → Pages → ritha-web → Settings → Builds & deployments):
#   - Framework preset:   Vite
#   - Build command:      npm run build
#   - Build output:       dist
#   - Root directory:     frontend
#   - Environment vars:   VITE_API_BASE_URL=https://api.getritha.com/api
#                         VITE_WS_BASE_URL=wss://api.getritha.com
#                         VITE_APP_VERSION=1.0.0

name = "ritha-web"
pages_build_output_dir = "./dist"
compatibility_date = "2026-04-24"
